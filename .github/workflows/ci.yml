name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # NODE_ENV=development so npm does not strip devDependencies (tsc, eslint,
      # vitest, vite). --include=dev belt-and-braces for the same reason.
      - name: Install
        run: NODE_ENV=development npm ci --include=dev

      # Builds the daemon (tsc) AND the frontend (vite) so frontend/dist exists.
      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Coverage is REPORTED but never GATES the build. vitest.config.ts keeps
      # local `thresholds` (handy for dev), which makes `npm run test:coverage`
      # exit non-zero when coverage dips below them. `continue-on-error: true`
      # lets that threshold breach surface in the logs without failing the job.
      # The Test step above is what actually gates correctness.
      - name: Coverage
        id: coverage
        continue-on-error: true
        run: npm run test:coverage

      # Append the json-summary totals to the run summary so the numbers are
      # visible without downloading the artifact. `always()` so it runs even if
      # the coverage step reported a threshold breach.
      - name: Coverage summary
        if: always()
        run: |
          node -e '
            const fs = require("fs");
            const p = "coverage/coverage-summary.json";
            if (!fs.existsSync(p)) {
              console.log("No coverage summary found; skipping.");
              process.exit(0);
            }
            const t = JSON.parse(fs.readFileSync(p, "utf8")).total;
            const row = (k) => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
            const out = [
              "## Coverage",
              "",
              "| Metric | % | Covered/Total |",
              "| --- | --- | --- |",
              row("lines"),
              row("statements"),
              row("functions"),
              row("branches"),
              "",
              "_Coverage is reported but does not gate the build._",
              "",
            ].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out);
          '

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
